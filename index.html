<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LE NOIR — Jazz Bar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&family=Libre+Baskerville:ital@0;1&display=swap');

:root {
  --bg:       #060608;
  --smoke:    #0d0d10;
  --burgundy: #8b1e2f;
  --wine:     #6b1523;
  --ash:      rgba(255,255,255,0.06);
  --line:     rgba(255,255,255,0.10);
  --dim:      rgba(255,255,255,0.04);
  --text:     rgba(230,220,210,0.95);
  --muted:    rgba(200,185,165,0.70);
  --ghost:    rgba(139,30,47,0.15);
  --glow:     rgba(139,30,47,0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--text);
  cursor: none;
  overflow-x: hidden;
  overflow-y: auto;
}

/* ══════════════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════════════ */
#cursor-dot {
  position: fixed;
  width: 6px; height: 6px;
  background: var(--burgundy);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: transform 0.05s;
  box-shadow: 0 0 8px var(--glow);
}
#cursor-trail {
  position: fixed;
  width: 20px; height: 20px;
  border: 1px solid rgba(139,30,47,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%,-50%);
  transition: left 0.12s ease, top 0.12s ease;
}
.film-dust {
  position: fixed;
  width: 3px; height: 3px;
  background: var(--burgundy);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99997;
  animation: dust-fly 0.6s ease-out forwards;
}
@keyframes dust-fly {
  0%   { opacity: 0.9; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.1); }
}

/* ══════════════════════════════════════════
   GATE (PASSWORD)
══════════════════════════════════════════ */
#gate {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 1s ease;
}
.gate-rule {
  width: 1px; height: 60px;
  background: linear-gradient(to bottom, transparent, var(--burgundy), transparent);
  margin-bottom: 32px;
}
.gate-name {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  letter-spacing: 0.5em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.gate-title {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text);
  margin-bottom: 6px;
}
.gate-subtitle {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--muted);
  margin-bottom: 48px;
}
.gate-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 40px 50px;
  border: 1px solid var(--line);
  background: var(--dim);
  position: relative;
}
.gate-box::before {
  content: '';
  position: absolute;
  top: -1px; left: 20%; right: 20%;
  height: 1px;
  background: var(--burgundy);
  opacity: 0.6;
}
.gate-label {
  font-size: 9px;
  letter-spacing: 0.4em;
  color: var(--muted);
  margin-bottom: 18px;
}
.gate-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(139,30,47,0.4);
  color: var(--text);
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  text-align: center;
  letter-spacing: 0.8em;
  padding-bottom: 10px;
  margin-bottom: 32px;
  outline: none;
  width: 160px;
}
.gate-input:focus { border-bottom-color: var(--burgundy); }
.gate-btn {
  font-size: 9px;
  letter-spacing: 0.4em;
  background: transparent;
  border: 1px solid rgba(139,30,47,0.4);
  color: var(--muted);
  padding: 10px 28px;
  cursor: none;
  transition: 0.3s;
  text-transform: uppercase;
}
.gate-btn:hover {
  border-color: var(--burgundy);
  color: var(--text);
  background: var(--ghost);
  box-shadow: 0 0 16px var(--ghost);
}
#gate-err {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #a04040;
  margin-top: 14px;
  display: none;
}

/* ══════════════════════════════════════════
   MAIN LAYOUT — single column, centered
══════════════════════════════════════════ */
#app {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px 60px;
}
#app.show { display: flex; animation: fadeIn 1.2s ease forwards; }
@keyframes fadeIn { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }

/* Header bar */
#bar {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 40px;
}
.bar-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  font-style: italic;
  letter-spacing: 0.05em;
  color: var(--text);
}
.bar-name span { color: var(--burgundy); }
.bar-meta {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-align: right;
}
#clk { display: block; margin-bottom: 3px; }

/* ══════════════════════════════════════════
   CINEMASCOPE FRAME  21:9
══════════════════════════════════════════ */
#cinema-wrap {
  width: 100%;
  max-width: 960px;
  position: relative;
  margin-bottom: 0;
}

#cinema {
  width: 100%;
  aspect-ratio: 21 / 9;
  position: relative;
  overflow: hidden;
  background: #050505;
  border: 1px solid rgba(139,30,47,0.5);
  box-shadow:
    0 0 0 1px rgba(139,30,47,0.15),
    0 0 30px rgba(139,30,47,0.08),
    inset 0 0 80px rgba(0,0,0,0.8);
  cursor: none;
}

/* Burgundy corner ticks */
#cinema::before, #cinema::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border: 1px solid var(--burgundy);
  opacity: 0.7;
  z-index: 10;
  pointer-events: none;
}
#cinema::before { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
#cinema::after  { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

/* Cover image */
#cover-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  filter: contrast(1.1) brightness(0.75) saturate(0.3);
  z-index: 1;
}

/* Empty state */
#cover-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: rgba(139,30,47,0.4);
  z-index: 1;
}

/* Film noise canvas */
#film-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
  opacity: 0.25;
  mix-blend-mode: screen;
}

/* Vignette overlay */
#cinema-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
  z-index: 4;
}

/* Track info overlay */
#cinema-info {
  position: absolute;
  bottom: 22px; left: 28px;
  z-index: 6;
  pointer-events: none;
}
#cinema-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(18px, 2.5vw, 28px);
  color: rgba(230,220,210,0.95);
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
  margin-bottom: 5px;
  line-height: 1.2;
}
#cinema-artist {
  font-size: 9px;
  letter-spacing: 0.4em;
  color: rgba(139,30,47,0.9);
  text-transform: uppercase;
}

/* Waveform canvas inside cinema */
#wave-canvas {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  pointer-events: none;
  z-index: 5;
  opacity: 0.6;
}

/* Click hint */
.cinema-hint {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(139,30,47,0.5);
  z-index: 7;
  pointer-events: none;
}

/* Hidden YT */
#yt-wrap { position: absolute; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none; top:-9999px; }

/* ══════════════════════════════════════════
   CONTROL STRIP
══════════════════════════════════════════ */
#controls {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 48px;
}

.ctrl-section {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.ctrl-section.center { justify-content: center; flex: 0 0 auto; padding: 0 32px; }
.ctrl-section.right  { justify-content: flex-end; }

.ctrl-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 13px;
  cursor: none;
  padding: 6px;
  transition: color 0.2s;
  line-height: 1;
}
.ctrl-btn:hover { color: var(--text); }

#play-btn {
  width: 38px; height: 38px;
  border: 1px solid rgba(139,30,47,0.5);
  border-radius: 50%;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  cursor: none;
  display: flex; align-items: center; justify-content: center;
  transition: 0.25s;
  padding-left: 2px;
}
#play-btn:hover {
  border-color: var(--burgundy);
  background: var(--ghost);
  box-shadow: 0 0 14px var(--ghost);
  color: #fff;
}

/* Volume */
.vol-label {
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--muted);
}
#vol-slider {
  -webkit-appearance: none;
  width: 70px; height: 1px;
  background: var(--line);
  outline: none;
  cursor: none;
}
#vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 6px; height: 6px;
  background: var(--burgundy);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--glow);
}

/* Mode btn */
#mode-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.25em;
  padding: 6px 12px;
  cursor: none;
  transition: 0.25s;
  text-transform: uppercase;
}
#mode-btn.active {
  border-color: rgba(139,30,47,0.4);
  color: var(--burgundy);
  background: var(--ghost);
}

/* ══════════════════════════════════════════
   TRACKLIST — jazz bar timetable style
══════════════════════════════════════════ */
#tracklist-section {
  width: 100%;
  max-width: 960px;
}

.tl-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.tl-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
}
.tl-count { font-size: 9px; color: rgba(139,30,47,0.6); letter-spacing: 0.2em; }

.tl-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

#tlist { list-style: none; }

/* ── Track row: flex-wrap so edit panel can go full width ── */
.track-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  gap: 0;
  position: relative;
  transition: background 0.2s;
  cursor: none;
}
.track-row:hover { background: var(--dim); }
.track-row.active { background: var(--ghost); }
.track-row.active .tr-num { color: var(--burgundy); }
.track-row.active .tr-title { color: rgba(240,230,220,0.98); }

/* Row top line: num + main + actions */
.tr-top {
  display: flex;
  align-items: center;
  width: 100%;
  gap: 16px;
}

.tr-num {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  width: 32px;
}
.tr-main { min-width: 0; flex: 1; }
.tr-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 15px;
  color: rgba(235,225,215,0.95);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tr-artist {
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(200,185,165,0.70);
  text-transform: uppercase;
}
.tr-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
}
.track-row:hover .tr-actions { opacity: 1; }
.track-row.active .tr-actions { opacity: 1; }
body.edit-mode .tr-actions { opacity: 1; }

.tr-play {
  background: transparent;
  border: 1px solid rgba(139,30,47,0.4);
  color: rgba(139,30,47,0.8);
  font-family: 'Share Tech Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.2em;
  padding: 4px 8px;
  cursor: none;
  transition: 0.2s;
}
.tr-play:hover { background: var(--ghost); color: var(--burgundy); border-color: var(--burgundy); }
.track-row.active .tr-play { display: none; }

.tr-del {
  background: transparent;
  border: none;
  color: rgba(140,60,60,0.5);
  font-size: 11px;
  cursor: none;
  padding: 2px 4px;
  transition: 0.2s;
  line-height: 1;
}
.tr-del:hover { color: #c05050; }

.tr-order {
  display: none;
  flex-direction: column;
  gap: 2px;
}
body.edit-mode .tr-order { display: flex; }

.tr-order-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  font-size: 7px;
  width: 16px; height: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: none;
  transition: 0.2s;
  line-height: 1;
}
.tr-order-btn:hover { border-color: var(--burgundy); color: var(--burgundy); }

/* ── Edit panel: lives at track-row level, full width ── */
.tr-edit {
  display: none;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  margin-top: 12px;
  padding: 14px 16px;
  border: 1px solid rgba(139,30,47,0.2);
  background: rgba(20,8,10,0.5);
}
body.edit-mode .tr-edit { display: flex; }

.tr-edit-label {
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(139,30,47,0.5);
  margin-bottom: 2px;
  text-transform: uppercase;
}
.tr-edit-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 6px;
}
.tr-edit-inp {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: rgba(230,220,210,0.95);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 6px 0;
  outline: none;
  width: 100%;
  letter-spacing: 0.05em;
  transition: border-color 0.2s;
}
.tr-edit-inp:focus { border-bottom-color: var(--burgundy); }
.tr-edit-inp::placeholder { color: rgba(180,160,140,0.45); }

/* ══════════════════════════════════════════
   BOTTOM TOOLBAR
══════════════════════════════════════════ */
#toolbar {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 20px;
  margin-top: 4px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
  gap: 10px;
}

.tb-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.2em;
  padding: 7px 14px;
  cursor: none;
  transition: 0.2s;
  text-transform: uppercase;
}
.tb-btn:hover, .tb-btn.on {
  border-color: rgba(139,30,47,0.5);
  color: var(--text);
  background: var(--ghost);
}
.tb-left, .tb-right { display: flex; gap: 8px; align-items: center; }
.tb-status {
  font-size: 8px;
  letter-spacing: 0.25em;
  color: rgba(139,30,47,0.5);
}

#backup-panel {
  display: none;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
#backup-panel.show { display: flex; }

/* ══════════════════════════════════════════
   MEMO SECTION
══════════════════════════════════════════ */
#memos {
  width: 100%;
  max-width: 960px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-top: 48px;
}
.memo-block {}
.memo-label {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(139,30,47,0.55);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.memo-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}
.memo-text {
  width: 100%;
  min-height: 90px;
  background: transparent;
  border: none;
  border-left: 1px solid var(--line);
  padding: 12px 16px;
  color: rgba(210,195,175,0.85);
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 12px;
  line-height: 1.8;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.memo-text:focus { border-left-color: rgba(139,30,47,0.4); color: var(--text); }

/* ══════════════════════════════════════════
   FILM GLITCH
══════════════════════════════════════════ */
@keyframes glitch {
  0%   { transform: translate(0); filter: none; }
  20%  { transform: translate(-2px, 1px); filter: hue-rotate(10deg); }
  40%  { transform: translate(1px, -1px); }
  60%  { transform: translate(-1px); filter: brightness(1.1); }
  100% { transform: translate(0); filter: none; }
}
.glitching { animation: glitch 0.1s linear; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(139,30,47,0.3); }
::-webkit-scrollbar-track { background: transparent; }

@media (max-width: 600px) {
  #memos { grid-template-columns: 1fr; }
  #cinema { aspect-ratio: 16/9; }
  .ctrl-section.right { display: none; }
}
</style>
</head>
<body>

<!-- CUSTOM CURSOR -->
<div id="cursor-dot"></div>
<div id="cursor-trail"></div>

<!-- ══════ GATE ══════ -->
<div id="gate">
  <div class="gate-rule"></div>
  <div class="gate-name">Le Noir</div>
  <div class="gate-title">Jazz Bar</div>
  <div class="gate-subtitle">Late Night Sessions · Entrance Reserved</div>
  <div class="gate-box">
    <div class="gate-label">Door Code</div>
    <input type="password" id="gate-inp" class="gate-input" maxlength="4" placeholder="····"
      onkeydown="if(event.key==='Enter') gateEnter()">
    <button class="gate-btn" onclick="gateEnter()">Enter</button>
    <div id="gate-err">Wrong door.</div>
  </div>
</div>

<!-- ══════ MAIN APP ══════ -->
<div id="app">

  <!-- Header bar -->
  <div id="bar">
    <div class="bar-name">Le <span>Noir</span></div>
    <div class="bar-meta">
      <span id="clk">00:00</span>
      <span id="clk-date">—</span>
    </div>
  </div>

  <!-- Cinema frame -->
  <div id="cinema-wrap">
    <div id="cinema" onclick="coverClick()">
      <canvas id="film-canvas"></canvas>
      <div id="cinema-vignette"></div>
      <img id="cover-img" src="" alt="">
      <div id="cover-empty">Click to set image</div>
      <canvas id="wave-canvas"></canvas>
      <div id="cinema-info">
        <div id="cinema-title">—</div>
        <div id="cinema-artist"></div>
      </div>
      <div class="cinema-hint">CLICK · IMAGE</div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-section left">
      <span class="vol-label">VOL</span>
      <input type="range" id="vol-slider" min="0" max="100" value="70"
        oninput="setVol(this.value)">
    </div>
    <div class="ctrl-section center">
      <button class="ctrl-btn" onclick="nav('prev')">⏮</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nav('next')">⏭</button>
    </div>
    <div class="ctrl-section right">
      <button id="mode-btn" onclick="toggleMode()">ALL REPEAT</button>
    </div>
  </div>

  <!-- Tracklist -->
  <div id="tracklist-section">
    <div class="tl-header">
      <span class="tl-title">Tonight's Programme</span>

    <!-- Toolbar -->

          <button class="tb-btn" onclick="document.getElementById('import-pick').click()">⬆ Import JSON</button>
          <input type="file" id="import-pick" accept=".json" style="display:none" onchange="importPlaylist(this)">
        </div>

  <!-- Memos -->
  <div id="memos">
    <div class="memo-block">
      <div class="memo-label">지배인의 비망록</div>

        placeholder="오늘 밤의 기록..."
        onblur="saveMemo('memo1', this.value)"></textarea>
    </div>
    <div class="memo-block">
      <div class="memo-label">손님들의 요청 메모</div>
      <textarea id="memo2" class="memo-text"
        placeholder="요청곡 메모..."

</div>

<!-- Hidden inputs -->
<input type="file" id="f-in" accept="image/*" style="display:none" onchange="fileChg(event)">
<div id="yt-wrap"><div id="yt"></div></div>

<script>
/* ═══════════════════════════════════════════
   STATE — 최상단 선언 (함수들보다 먼저)
═══════════════════════════════════════════ */
let frames = [];
let curIdx  = -1;
let playing = false;
let playMode = 'all';
let editMode = false;
let vol      = 70;
let ytp = null, ytReady = false, pendVid = null;

try {
  const s = localStorage.getItem('stellar_playlist');
  if (s) frames = JSON.parse(s);
} catch(e) {}

if (!frames || frames.length === 0) {
  frames = [
    { id:1, title:"Autumn Leaves", artist:"Bill Evans Trio", yt:"r-Z8KuwI7GI" },
    { id:2, title:"Round Midnight", artist:"Miles Davis", yt:"" }
  ];
}

/* ═══════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════ */
const dot   = document.getElementById('cursor-dot');
const trail = document.getElementById('cursor-trail');
let mx = window.innerWidth/2, my = window.innerHeight/2;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
  setTimeout(() => {
    trail.style.left = mx + 'px';
    trail.style.top  = my + 'px';
  }, 80);
});

document.addEventListener('click', e => {
  // Film dust splatter
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'film-dust';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 18 + Math.random() * 28;
    d.style.left = e.clientX + 'px';
    d.style.top  = e.clientY + 'px';
    d.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    d.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 620);
  }
  vinylClick();
});

/* ═══════════════════════════════════════════
   AUDIO — Vinyl Crackle sound
═══════════════════════════════════════════ */
function vinylClick() {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = actx.createBuffer(1, actx.sampleRate * 0.12, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3) * 0.18;
    }
    const src = actx.createBufferSource();
    const filt = actx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 800;
    filt.Q.value = 0.5;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.5, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.1);
    src.buffer = buf;
    src.connect(filt);
    filt.connect(gain);
    gain.connect(actx.destination);
    src.start();
  } catch(e) {}
}

function softBeep(freq = 900) {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.025, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.06);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(); osc.stop(actx.currentTime + 0.06);
  } catch(e) {}
}

/* ═══════════════════════════════════════════
   FILM NOISE CANVAS
═══════════════════════════════════════════ */
const filmC = document.getElementById('film-canvas');
const filmX = filmC.getContext('2d');

function resizeFilm() {
  filmC.width  = filmC.offsetWidth;
  filmC.height = filmC.offsetHeight;
}
resizeFilm();
window.addEventListener('resize', resizeFilm);

function animFilm() {
  const w = filmC.width, h = filmC.height;
  filmX.clearRect(0, 0, w, h);

  // Horizontal scan lines
  for (let y = 0; y < h; y += 3) {
    if (Math.random() > 0.97) {
      filmX.fillStyle = `rgba(255,255,255,${Math.random() * 0.06})`;
      filmX.fillRect(0, y, w, 1);
    }
  }

  // Vertical scratches
  for (let i = 0; i < 2; i++) {
    if (Math.random() > 0.92) {
      const x = Math.random() * w;
      const len = 20 + Math.random() * 80;
      const sy  = Math.random() * h;
      filmX.strokeStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
      filmX.lineWidth = 1;
      filmX.beginPath();
      filmX.moveTo(x, sy);
      filmX.lineTo(x + (Math.random() - 0.5) * 2, sy + len);
      filmX.stroke();
    }
  }

  // Dust specks
  for (let i = 0; i < 6; i++) {
    if (Math.random() > 0.85) {
      filmX.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
      filmX.beginPath();
      filmX.arc(Math.random()*w, Math.random()*h, Math.random()*1.2, 0, Math.PI*2);
      filmX.fill();
    }
  }

  requestAnimationFrame(animFilm);
}
animFilm();

/* ═══════════════════════════════════════════
   SMOOTH WAVEFORM CANVAS
═══════════════════════════════════════════ */
const waveC = document.getElementById('wave-canvas');
const waveX = waveC.getContext('2d');
let wavePoints = [];
const WAVE_N = 80;

for (let i = 0; i < WAVE_N; i++) {
  wavePoints.push({ y: 0, vy: 0, t: Math.random() * Math.PI * 2 });
}

function resizeWave() {
  waveC.width  = waveC.offsetWidth  || 960;
  waveC.height = waveC.offsetHeight || 60;
}
resizeWave();
window.addEventListener('resize', resizeWave);

function animWave() {
  const w = waveC.width, h = waveC.height;
  waveX.clearRect(0, 0, w, h);

  const amp = playing ? 18 : 3;

  wavePoints.forEach((p, i) => {
    p.t += playing ? 0.035 + Math.random()*0.01 : 0.008;
    const target = Math.sin(p.t + i * 0.3) * amp
                 + Math.sin(p.t * 1.7 + i * 0.15) * amp * 0.4;
    p.vy = p.vy * 0.75 + (target - p.y) * 0.25;
    p.y += p.vy;
  });

  // Draw smooth curve
  waveX.beginPath();
  const sliceW = w / (WAVE_N - 1);

  waveX.moveTo(0, h/2 + wavePoints[0].y);
  for (let i = 1; i < WAVE_N - 1; i++) {
    const cx  = (i - 0.5) * sliceW;
    const cy  = h/2 + (wavePoints[i-1].y + wavePoints[i].y) / 2;
    const cx2 = i * sliceW;
    const cy2 = h/2 + wavePoints[i].y;
    waveX.quadraticCurveTo(cx, cy, cx2, cy2);
  }
  waveX.lineTo(w, h/2 + wavePoints[WAVE_N-1].y);

  // Gradient stroke
  const grad = waveX.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0,   'rgba(139,30,47,0)');
  grad.addColorStop(0.2, 'rgba(139,30,47,0.7)');
  grad.addColorStop(0.5, 'rgba(180,40,60,0.9)');
  grad.addColorStop(0.8, 'rgba(139,30,47,0.7)');
  grad.addColorStop(1,   'rgba(139,30,47,0)');

  waveX.strokeStyle = grad;
  waveX.lineWidth   = 1.5;
  waveX.shadowColor = 'rgba(139,30,47,0.5)';
  waveX.shadowBlur  = 8;
  waveX.stroke();

  // Mirror wave (faint)
  waveX.beginPath();
  waveX.moveTo(0, h/2 - wavePoints[0].y * 0.4);
  for (let i = 1; i < WAVE_N - 1; i++) {
    const cx  = (i - 0.5) * sliceW;
    const cy  = h/2 - (wavePoints[i-1].y + wavePoints[i].y) / 2 * 0.4;
    const cx2 = i * sliceW;
    const cy2 = h/2 - wavePoints[i].y * 0.4;
    waveX.quadraticCurveTo(cx, cy, cx2, cy2);
  }
  waveX.lineTo(w, h/2 - wavePoints[WAVE_N-1].y * 0.4);
  waveX.strokeStyle = 'rgba(139,30,47,0.2)';
  waveX.lineWidth = 1;
  waveX.shadowBlur = 0;
  waveX.stroke();

  requestAnimationFrame(animWave);
}
animWave();

/* ═══════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════ */
function updClock() {
  const n = new Date();
  const p = x => String(x).padStart(2,'0');
  document.getElementById('clk').textContent =
    `${p(n.getHours())}:${p(n.getMinutes())}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('clk-date').textContent =
    `${n.getFullYear()}.${p(n.getMonth()+1)}.${p(n.getDate())} ${days[n.getDay()]}`;
}
setInterval(updClock, 1000); updClock();

// Memos
['memo1','memo2'].forEach(k => {
  const v = localStorage.getItem('noir_' + k);
  if (v) document.getElementById(k).value = v;
});

function saveMemo(k, v) {
  localStorage.setItem('noir_' + k, v);
}

/* ═══════════════════════════════════════════
   RENDER TRACKLIST
═══════════════════════════════════════════ */
function renderList() {
  const ul = document.getElementById('tlist');
  ul.innerHTML = '';
  document.getElementById('tl-count').textContent = frames.length + ' tracks';

  frames.forEach((f, i) => {
    const li = document.createElement('li');
    li.className = 'track-row' + (i === curIdx ? ' active' : '');

    const titleSafe  = (f.title  || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const artistSafe = (f.artist || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const ytSafe     = (f.yt     || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');

    li.innerHTML = `
      <div class="tr-top">
        <span class="tr-num">${String(i+1).padStart(2,'0')}</span>
        <div class="tr-main">
          <div class="tr-title">${f.title || '—'}</div>
          <div class="tr-artist">${f.artist || ''}</div>
        </div>
        <div class="tr-actions">
          <div class="tr-order">
            <button class="tr-order-btn">▲</button>
            <button class="tr-order-btn">▼</button>
          </div>
          <button class="tr-play">CONNECT</button>
          <button class="tr-del">✕</button>
        </div>
      </div>
      <div class="tr-edit">
        <div class="tr-edit-row">
          <div class="tr-edit-label">Title</div>
          <input class="tr-edit-inp" value="${titleSafe}" placeholder="곡 제목">
        </div>
        <div class="tr-edit-row">
          <div class="tr-edit-label">Artist</div>
          <input class="tr-edit-inp artist-inp" value="${artistSafe}" placeholder="아티스트">
        </div>
        <div class="tr-edit-row">
          <div class="tr-edit-label">YouTube ID / URL</div>
          <input class="tr-edit-inp yt-inp" value="${ytSafe}" placeholder="dQw4w9WgXcQ 또는 전체 URL">
        </div>
      </div>
    `;

    // tr-top 클릭 → 재생 (editMode 아닐 때만)
    li.querySelector('.tr-top').addEventListener('click', () => {
      if (!editMode) playIdx(i);
    });

    // 순서 버튼
    const orderBtns = li.querySelectorAll('.tr-order-btn');
    orderBtns[0].addEventListener('click', e => { e.stopPropagation(); moveTrack(i, -1); });
    orderBtns[1].addEventListener('click', e => { e.stopPropagation(); moveTrack(i,  1); });

    // CONNECT 버튼
    li.querySelector('.tr-play').addEventListener('click', e => { e.stopPropagation(); playIdx(i); });

    // 삭제 버튼
    li.querySelector('.tr-del').addEventListener('click', e => { e.stopPropagation(); delTrack(i); });

    // 편집 인풋들 — stopPropagation + oninput
    const inps = li.querySelectorAll('.tr-edit-inp');
    inps[0].addEventListener('click',  e => e.stopPropagation());
    inps[0].addEventListener('input',  e => updTrack(i, 'title', e.target.value));

    inps[1].addEventListener('click',  e => e.stopPropagation());
    inps[1].addEventListener('input',  e => updTrack(i, 'artist', e.target.value));

    inps[2].addEventListener('click',  e => e.stopPropagation());
    inps[2].addEventListener('input',  e => updTrack(i, 'yt', e.target.value));

    // tr-edit 자체 클릭도 버블링 차단
    li.querySelector('.tr-edit').addEventListener('click', e => e.stopPropagation());

    ul.appendChild(li);
  });

  // editMode 상태면 편집 패널 보이기
  if (editMode) {
    document.querySelectorAll('.tr-edit').forEach(el => { el.style.display = 'flex'; });
    document.querySelectorAll('.tr-order').forEach(el => { el.style.display = 'flex'; });
  }
}

function applyEditDOM() {
  document.querySelectorAll('.tr-edit').forEach(el => {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  });
  document.querySelectorAll('.tr-order').forEach(el => {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  });
}

/* ═══════════════════════════════════════════
   PLAY
═══════════════════════════════════════════ */
function playIdx(i) {
  if (i < 0 || i >= frames.length) return;
  curIdx = i;
  const f = frames[i];

  // Glitch
  document.getElementById('app').classList.add('glitching');
  setTimeout(() => document.getElementById('app').classList.remove('glitching'), 110);

  // Update cinema
  document.getElementById('cinema-title').textContent  = f.title  || '—';
  document.getElementById('cinema-artist').textContent = f.artist || '';

  // Cover image
  const img   = document.getElementById('cover-img');
  const empty = document.getElementById('cover-empty');
  try {
    const stored = localStorage.getItem(`stellar_media_${f.id}`);
    if (stored) { img.src = stored; img.style.display = 'block'; empty.style.display = 'none'; }
    else        { img.src = '';     img.style.display = 'none';  empty.style.display = 'flex'; }
  } catch(e) {
    img.style.display = 'none'; empty.style.display = 'flex';
  }

  renderList();

  // YouTube
  if (f.yt) {
    if (ytReady && ytp) {
      ytp.loadVideoById({ videoId: f.yt, startSeconds: 0 });
      ytp.setVolume(vol);
      ytp.playVideo();
    } else {
      pendVid = f.yt;
    }
    playing = true;
    document.getElementById('play-btn').innerHTML = '⏸';
  } else {
    if (ytp) ytp.pauseVideo();
    playing = false;
    document.getElementById('play-btn').innerHTML = '▶';
  }
}

function togglePlay() {
  if (curIdx === -1 && frames.length > 0) { playIdx(0); return; }
  if (!ytReady || !ytp) return;
  if (playing) {
    ytp.pauseVideo();
    playing = false;
    document.getElementById('play-btn').innerHTML = '▶';
  } else {
    ytp.playVideo();
    playing = true;
    document.getElementById('play-btn').innerHTML = '⏸';
  }
}

function nav(dir) {
  if (frames.length === 0) return;
  let n = curIdx;
  if (playMode === 'shuffle') {
    n = Math.floor(Math.random() * frames.length);
  } else {
    if (dir === 'next') n = (curIdx + 1) % frames.length;
    else                n = (curIdx - 1 + frames.length) % frames.length;
  }
  playIdx(n);
}

/* ═══════════════════════════════════════════
   VOLUME / MODE
═══════════════════════════════════════════ */
function setVol(v) {
  vol = v;
  if (ytp && ytReady) ytp.setVolume(vol);
}

function toggleMode() {
  const btn = document.getElementById('mode-btn');
  if (playMode === 'all')     { playMode = 'one';     btn.textContent = 'SINGLE TRACK';  btn.classList.add('active'); }
  else if (playMode === 'one'){ playMode = 'shuffle'; btn.textContent = 'SIGNAL SHUFFLE'; btn.classList.add('active'); }
  else                        { playMode = 'all';     btn.textContent = 'ALL REPEAT';    btn.classList.remove('active'); }
  softBeep(700);
}

/* ═══════════════════════════════════════════
   EDIT MODE
═══════════════════════════════════════════ */
function toggleEdit() {
  editMode = !editMode;
  const btn  = document.getElementById('edit-btn');
  const addB = document.getElementById('add-btn');
  const bkp  = document.getElementById('backup-panel');
  const stat = document.getElementById('tb-status');

  if (editMode) {
    document.body.classList.add('edit-mode');
    btn.textContent = '✕ Close';
    btn.classList.add('on');
    addB.style.display = 'inline-block';
    bkp.classList.add('show');
    stat.textContent = 'EDIT MODE';
    // 편집 패널 표시
    document.querySelectorAll('.tr-edit').forEach(el => {
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
    });
    document.querySelectorAll('.tr-order').forEach(el => {
      el.style.display = 'flex';
      el.style.flexDirection = 'column';
    });
  } else {
    document.body.classList.remove('edit-mode');
    btn.textContent = '+ Edit';
    btn.classList.remove('on');
    addB.style.display = 'none';
    bkp.classList.remove('show');
    stat.textContent = 'MONITORING';
    // 편집 패널 숨기기
    document.querySelectorAll('.tr-edit').forEach(el => { el.style.display = 'none'; });
    document.querySelectorAll('.tr-order').forEach(el => { el.style.display = 'none'; });
    localStorage.setItem('stellar_playlist', JSON.stringify(frames));
  }
  softBeep(editMode ? 1100 : 800);
}

/* ═══════════════════════════════════════════
   TRACK CRUD
═══════════════════════════════════════════ */
function addTrack() {
  const newId = frames.length > 0 ? Math.max(...frames.map(f => f.id)) + 1 : 1;
  frames.push({ id: newId, title: "New Track", artist: "Unknown", yt: "" });
  localStorage.setItem('stellar_playlist', JSON.stringify(frames));
  renderList();
  // renderList 이후 applyEditDOM 재호출 (renderList 내부에서 editMode체크하지만 확실히)
  applyEditDOM();
}

function delTrack(i) {
  localStorage.removeItem(`stellar_media_${frames[i].id}`);
  frames.splice(i, 1);
  if (curIdx === i) curIdx = -1;
  else if (curIdx > i) curIdx--;
  localStorage.setItem('stellar_playlist', JSON.stringify(frames));
  renderList();
  if (editMode) applyEditDOM();
}

function moveTrack(index, dir) {
  const target = index + dir;
  if (target < 0 || target >= frames.length) return;
  let playId = curIdx !== -1 ? frames[curIdx].id : null;
  [frames[index], frames[target]] = [frames[target], frames[index]];
  if (playId !== null) curIdx = frames.findIndex(f => f.id === playId);
  localStorage.setItem('stellar_playlist', JSON.stringify(frames));
  renderList();
  if (editMode) applyEditDOM();
  softBeep(1200);
}

function extractYtId(val) {
  const patterns = [
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = val.match(p);
    if (m) return m[1];
  }
  return val;
}

function updTrack(i, key, val) {
  if (key === 'yt') val = extractYtId(val.trim());
  frames[i][key] = val;
  localStorage.setItem('stellar_playlist', JSON.stringify(frames));
  if (key !== 'yt' && i === curIdx) {
    document.getElementById('cinema-title').textContent  = frames[i].title  || '—';
    document.getElementById('cinema-artist').textContent = frames[i].artist || '';
  }
}

/* ═══════════════════════════════════════════
   COVER IMAGE
═══════════════════════════════════════════ */
function coverClick() {
  if (curIdx !== -1) document.getElementById('f-in').click();
}

function fileChg(e) {
  const file = e.target.files[0];
  if (!file || curIdx === -1) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const res = evt.target.result;
    const img   = document.getElementById('cover-img');
    const empty = document.getElementById('cover-empty');
    img.src = res; img.style.display = 'block'; empty.style.display = 'none';
    localStorage.setItem(`stellar_media_${frames[curIdx].id}`, res);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

/* ═══════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════ */
function exportPlaylist() {
  const data = { version: 1, frames: frames.map(f => ({ title:f.title, artist:f.artist, yt:f.yt, id:f.id })) };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'noir_playlist.json'; a.click();
  URL.revokeObjectURL(url);
}

function importPlaylist(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.frames || !Array.isArray(data.frames)) { alert('올바른 백업 파일이 아닙니다.'); return; }
      frames = data.frames.map((f, i) => ({ id: f.id||i+1, title:f.title||'', artist:f.artist||'', yt:f.yt||'' }));
      localStorage.setItem('stellar_playlist', JSON.stringify(frames));
      renderList();
      if (editMode) applyEditDOM();
      alert('✓ 복원 완료: ' + frames.length + '개 트랙');
    } catch(err) { alert('파일 읽기 실패: ' + err.message); }
  };
  reader.readAsText(input.files[0]);
  input.value = '';
}

/* ═══════════════════════════════════════════
   GATE
═══════════════════════════════════════════ */
function gateEnter() {
  const val = document.getElementById('gate-inp').value;
  if (val === '0000') {
    const gate = document.getElementById('gate');
    gate.style.opacity = '0';
    setTimeout(() => {
      gate.style.display = 'none';
      const app = document.getElementById('app');
      app.classList.add('show');
      renderList();
    }, 900);
  } else {
    const err = document.getElementById('gate-err');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2200);
    vinylClick();
  }
}

document.getElementById('gate-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') gateEnter();
});

   YOUTUBE IFrame API
═══════════════════════════════════════════ */
(function() {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(s);
})();

function onYouTubeIframeAPIReady() {
  ytp = new YT.Player('yt', {
    events: {
      onReady: () => {
        ytReady = true;
        ytp.setVolume(vol);
        if (pendVid) {
          ytp.loadVideoById({ videoId: pendVid, startSeconds: 0 });
          ytp.setVolume(vol);
          ytp.playVideo();
          pendVid = null;
        }
      },
      onStateChange: e => {
        const btn = document.getElementById('play-btn');
        if (e.data === YT.PlayerState.PLAYING) {
          playing = true; btn.innerHTML = '⏸';
        } else if (e.data === YT.PlayerState.PAUSED) {
          playing = false; btn.innerHTML = '▶';
        } else if (e.data === YT.PlayerState.ENDED) {
          playing = false; btn.innerHTML = '▶';
          if (playMode === 'one' && curIdx !== -1) playIdx(curIdx);
          else nav('next');
        }
      }
    }
  });
}
